name: pm-helper

services:
  db:
    image: postgres:15-alpine
    container_name: pm_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 15
    networks:
      - pm_network

  backend:
    build: ./backend
    container_name: pm_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      # Fixed 5000 so Nginx upstream in frontend/nginx.conf matches
      PORT: "5000"
      SECRET_KEY: ${SECRET_KEY}
      # Set to 1 when the app is served only over HTTPS (otherwise auth cookies won’t work on http://)
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      URGENCY_TIMEZONE: ${URGENCY_TIMEZONE:-UTC}
    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pm_network

  frontend:
    build: ./frontend
    container_name: pm_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - pm_network

volumes:
  postgres_data:

networks:
  pm_network:
    driver: bridge
